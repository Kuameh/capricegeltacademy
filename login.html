<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — CGA Academy</title>
    <meta name="description" content="Sign in to your CGA Academy student dashboard.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/cga-logo.svg">
</head>

<body>

    <!-- Grid Overlay -->
    <div class="grid-overlay">
        <div class="grid-line-v"></div>
        <div class="grid-line-v"></div>
        <div class="grid-line-v"></div>
        <div class="grid-line-v"></div>
    </div>

    <section class="auth-page">
        <div class="auth-container">
            <a href="index.html" class="auth-logo">
                <img src="assets/images/cga-logo.svg" alt="CGA Logo">
                CGA ACADEMY
            </a>

            <div class="auth-card">
                <h2>Welcome Back</h2>
                <p class="auth-subtitle">Sign in to access your courses and dashboard.</p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>

                    <a href="#" id="forgot-password" class="forgot-link">Forgot password?</a>

                    <div id="auth-error" class="auth-error"></div>

                    <button type="submit" class="btn-auth">Sign In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Redirect if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'dashboard.html';
        });
        initLogin();
        initPasswordReset();
    </script>
</body>

</html>
